name: build sing-box rules

on:
  push:
  schedule:
    - cron: "0 2 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install deps
        run: pip install requests pyyaml

      - name: run build
        run: python build.py

      - name: commit result
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add sing-box.json
          git commit -m "update rules" || echo "no changes"
          git push
